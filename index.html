<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Pro - 專業代購報價系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel (CDN 模式) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { CreditCard, Banknote, User, ShoppingBag, Globe, Receipt, Truck, FileCheck, Save, Trash2, Calculator, TrendingUp, Image, Copy } = lucide;

        function App() {
            const [activeTab, setActiveTab] = useState('calc');
            const [history, setHistory] = useState([]);
            const receiptRef = useRef(null);
            const [isCopying, setIsCopying] = useState(false);

            // 狀態定義
            const [paymentMethod, setPaymentMethod] = useState('card');
            const [currency, setCurrency] = useState('JPY');
            const [receiptForeign, setReceiptForeign] = useState('');
            const [receiptTwd, setReceiptTwd] = useState('');
            const [cashForeign, setCashForeign] = useState('');
            const [cashTwd, setCashTwd] = useState('');
            const [buyerName, setBuyerName] = useState('');
            const [itemName, setItemName] = useState('');
            const [itemForeignPrice, setItemForeignPrice] = useState('');
            const [itemQty, setItemQty] = useState(1);
            const [country, setCountry] = useState('JP_10');
            const [taxRate, setTaxRate] = useState(10);
            const [taxType, setTaxType] = useState('pretax'); 
            const [storeDiscount, setStoreDiscount] = useState('');
            const [serviceFee, setServiceFee] = useState('');
            const [shippingFee, setShippingFee] = useState('');
            const [result, setResult] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('agent_pro_records');
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            const getActualCostRate = () => {
                if (paymentMethod === 'card') {
                    const rf = parseFloat(receiptForeign);
                    const rt = parseFloat(receiptTwd);
                    return (rf > 0 && rt > 0) ? (rt / rf) : 0;
                } else {
                    const cf = parseFloat(cashForeign);
                    const ct = parseFloat(cashTwd);
                    return (cf > 0 && ct > 0) ? (ct / cf) : 0;
                }
            };

            const calculate = () => {
                const actualRate = getActualCostRate();
                if (actualRate <= 0) return alert('請填寫完整「收據金額」與「台幣扣款」以計算匯率。');
                const price = parseFloat(itemForeignPrice) || 0;
                const qty = parseInt(itemQty) || 1;
                if (price <= 0) return alert('請填寫商品外幣單價。');

                const baseItemTwd = price * qty * actualRate;
                const creditCardFeeTwd = paymentMethod === 'card' ? (baseItemTwd * 0.015) : 0;
                const govRefundTwd = (taxType === 'posttax') ? (baseItemTwd * (parseFloat(taxRate) || 0) / 100) : 0;
                const storeRefundTwd = baseItemTwd * ((parseFloat(storeDiscount) || 0) / 100);
                const sFee = parseFloat(shippingFee) || 0;
                const svc = parseFloat(serviceFee) || 0;

                const finalChargeTwd = baseItemTwd + creditCardFeeTwd - govRefundTwd - storeRefundTwd + sFee + svc;

                setResult({
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    buyer: buyerName || '委託人',
                    item: itemName || '代購商品',
                    baseItemTwd, creditCardFeeTwd, govRefundTwd, storeRefundTwd, sFee, svc, finalChargeTwd
                });
            };

            const saveRecord = () => {
                if (!result) return;
                const newHistory = [result, ...history];
                setHistory(newHistory);
                localStorage.setItem('agent_pro_records', JSON.stringify(newHistory));
                alert('✅ 已儲存！');
            };

            const copyToImage = async () => {
                if (!receiptRef.current) return;
                setIsCopying(true);
                const canvas = await html2canvas(receiptRef.current, { scale: 2, backgroundColor: '#1e293b' });
                canvas.toBlob(async (blob) => {
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    setIsCopying(false);
                    alert('✅ 已複製圖片，請直接在聊天視窗貼上！');
                });
            };

            return (
                <div className="p-4 max-w-2xl mx-auto space-y-6">
                    <h1 className="text-2xl font-bold text-center">代購報價系統</h1>
                    
                    {/* 付款區 */}
                    <div className="bg-white p-4 rounded-lg shadow">
                        <h2 className="font-bold mb-3">1. 付款方式</h2>
                        <div className="flex gap-2">
                            <button onClick={()=>setPaymentMethod('card')} className={`flex-1 p-2 rounded ${paymentMethod==='card'?'bg-blue-600 text-white':'bg-gray-100'}`}>信用卡</button>
                            <button onClick={()=>setPaymentMethod('cash')} className={`flex-1 p-2 rounded ${paymentMethod==='cash'?'bg-blue-600 text-white':'bg-gray-100'}`}>現金</button>
                        </div>
                        {paymentMethod === 'card' ? (
                            <div className="grid grid-cols-2 gap-2 mt-3">
                                <input placeholder="收據外幣總額" onChange={e=>setReceiptForeign(e.target.value)} className="border p-2 rounded"/>
                                <input placeholder="台幣扣款總額" onChange={e=>setReceiptTwd(e.target.value)} className="border p-2 rounded"/>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-2 mt-3">
                                <input placeholder="現金換匯外幣" onChange={e=>setCashForeign(e.target.value)} className="border p-2 rounded"/>
                                <input placeholder="實際台幣金額" onChange={e=>setCashTwd(e.target.value)} className="border p-2 rounded"/>
                            </div>
                        )}
                    </div>

                    {/* 購買資訊 */}
                    <div className="bg-white p-4 rounded-lg shadow">
                        <h2 className="font-bold mb-3">2. 購買資訊</h2>
                        <input placeholder="購買人" onChange={e=>setBuyerName(e.target.value)} className="w-full border p-2 rounded mb-2"/>
                        <input placeholder="品項名稱" onChange={e=>setItemName(e.target.value)} className="w-full border p-2 rounded mb-2"/>
                        <div className="grid grid-cols-2 gap-2">
                            <input placeholder="單價 (外幣)" onChange={e=>setItemForeignPrice(e.target.value)} className="border p-2 rounded"/>
                            <input placeholder="數量" onChange={e=>setItemQty(e.target.value)} className="border p-2 rounded"/>
                        </div>
                    </div>

                    <button onClick={calculate} className="w-full bg-blue-600 text-white p-4 rounded-lg font-bold">立即計算</button>

                    {/* 結果 */}
                    {result && (
                        <div ref={receiptRef} className="bg-slate-800 text-white p-6 rounded-lg space-y-2">
                            <h3 className="text-xl font-bold border-b border-slate-600 pb-2 mb-4">商品電子明細</h3>
                            <div className="flex justify-between"><span>基準金額:</span><span>NT$ {result.baseItemTwd.toFixed(0)}</span></div>
                            {result.creditCardFeeTwd > 0 && <div className="flex justify-between"><span>信用卡手續費(1.5%):</span><span>+ NT$ {result.creditCardFeeTwd.toFixed(0)}</span></div>}
                            <div className="text-3xl font-black pt-4 border-t mt-4 text-blue-400">NT$ {result.finalChargeTwd.toFixed(0)}</div>
                        </div>
                    )}
                    
                    {result && <button onClick={copyToImage} className="w-full bg-green-600 text-white p-3 rounded-lg font-bold">複製圖片</button>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
