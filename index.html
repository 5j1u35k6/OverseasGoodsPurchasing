<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentPro</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (讓瀏覽器支援 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;
const {
  CreditCard, Banknote, User, ShoppingBag, Globe, Receipt,
  Truck, FileCheck, Save, Trash2, Calculator, TrendingUp,
  Store, DollarSign, Copy, Image
} = lucide;

function App() {
  const [activeTab, setActiveTab] = useState('calc');
  const [history, setHistory] = useState([]);

  const receiptRef = useRef(null);
  const [isCopying, setIsCopying] = useState(false);

  const [paymentMethod, setPaymentMethod] = useState('card');
  const [currency, setCurrency] = useState('JPY');
  const [receiptForeign, setReceiptForeign] = useState('');
  const [receiptTwd, setReceiptTwd] = useState('');
  const [cashForeign, setCashForeign] = useState('');
  const [cashTwd, setCashTwd] = useState('');

  const [buyerName, setBuyerName] = useState('');
  const [itemName, setItemName] = useState('');
  const [itemForeignPrice, setItemForeignPrice] = useState('');
  const [itemQty, setItemQty] = useState(1);

  const [country, setCountry] = useState('JP_10');
  const [taxRate, setTaxRate] = useState(10);
  const [taxType, setTaxType] = useState('pretax');
  const [storeDiscount, setStoreDiscount] = useState('');

  const [shippingFee, setShippingFee] = useState('');
  const [serviceFeeType, setServiceFeeType] = useState('fixed');
  const [serviceFeeValue, setServiceFeeValue] = useState(150);
  const [platformFeeRate, setPlatformFeeRate] = useState(0);

  const [result, setResult] = useState(null);

  useEffect(() => {
    const saved = localStorage.getItem('agent_pro_advanced_records');
    if (saved) setHistory(JSON.parse(saved));

    if (!window.html2canvas) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      document.head.appendChild(script);
    }
  }, []);

  const getActualCostRate = () => {
    if (paymentMethod === 'card') {
      const rf = parseFloat(receiptForeign);
      const rt = parseFloat(receiptTwd);
      return (rf > 0 && rt > 0) ? (rt / rf) : 0;
    } else {
      const cf = parseFloat(cashForeign);
      const ct = parseFloat(cashTwd);
      return (cf > 0 && ct > 0) ? (ct / cf) : 0;
    }
  };

  const calculate = () => {
    const actualRate = getActualCostRate();
    if (actualRate <= 0) return alert('請先填寫匯率');

    const price = parseFloat(itemForeignPrice) || 0;
    const qty = parseInt(itemQty) || 1;

    const sFee = parseFloat(shippingFee) || 0;

    const baseItemTwd = price * qty * actualRate;
    const creditCardFeeTwd = paymentMethod === 'card' ? baseItemTwd * 0.015 : 0;

    const tRate = (parseFloat(taxRate) || 0) / 100;
    const govRefundTwd = (taxType === 'posttax') ? baseItemTwd * tRate : 0;

    const dRate = (parseFloat(storeDiscount) || 0) / 100;
    const storeRefundTwd = baseItemTwd * dRate;

    const serviceFeeTwd = serviceFeeType === 'fixed'
      ? (parseFloat(serviceFeeValue) || 0)
      : baseItemTwd * ((parseFloat(serviceFeeValue) || 0) / 100);

    const subTotal = baseItemTwd + creditCardFeeTwd - govRefundTwd - storeRefundTwd + sFee + serviceFeeTwd;
    const platformFeeTwd = subTotal * ((parseFloat(platformFeeRate) || 0) / 100);

    const finalChargeTwd = subTotal + platformFeeTwd;

    setResult({
      id: Date.now(),
      date: new Date().toLocaleString(),
      buyer: buyerName,
      item: itemName,
      currency,
      actualRate,
      price,
      qty,
      baseItemTwd,
      ccFee: creditCardFeeTwd,
      govRefund: govRefundTwd,
      storeRefund: storeRefundTwd,
      shipping: sFee,
      svc: serviceFeeTwd,
      platform: platformFeeTwd,
      finalCharge: finalChargeTwd
    });
  };

  const saveRecord = () => {
    if (!result) return;
    const newHistory = [result, ...history];
    setHistory(newHistory);
    localStorage.setItem('agent_pro_advanced_records', JSON.stringify(newHistory));
    alert('已儲存');
  };

  const deleteRecord = (id) => {
    const newHistory = history.filter(h => h.id !== id);
    setHistory(newHistory);
    localStorage.setItem('agent_pro_advanced_records', JSON.stringify(newHistory));
  };

  const copyToImage = async () => {
    const canvas = await window.html2canvas(receiptRef.current, { scale: 2 });
    canvas.toBlob(async (blob) => {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
      alert('已複製圖片');
    });
  };

  const formatMoney = (n) => Math.round(n).toLocaleString();

  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-4">AgentPro</h1>

      <button onClick={() => setActiveTab('calc')}>計算</button>
      <button onClick={() => setActiveTab('history')}>歷史</button>

      {activeTab === 'calc' && (
        <div className="space-y-4">

          <input placeholder="商品名稱" value={itemName} onChange={e=>setItemName(e.target.value)} />
          <input placeholder="價格" value={itemForeignPrice} onChange={e=>setItemForeignPrice(e.target.value)} />

          <button onClick={calculate} className="bg-black text-white p-2">
            計算
          </button>

          {result && (
            <div ref={receiptRef} className="bg-black text-white p-4 mt-4">
              <p>{result.item}</p>
              <p>總價 NT$ {formatMoney(result.finalCharge)}</p>
            </div>
          )}

          {result && (
            <div className="flex gap-2">
              <button onClick={copyToImage}>複製圖片</button>
              <button onClick={saveRecord}>儲存</button>
            </div>
          )}

        </div>
      )}

      {activeTab === 'history' && (
        <div>
          {history.map(h => (
            <div key={h.id} className="border p-2 mb-2">
              <p>{h.item}</p>
              <p>{formatMoney(h.finalCharge)}</p>
              <button onClick={() => deleteRecord(h.id)}>刪除</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
