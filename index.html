<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Overseas Goods Purchasing Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#081120;
  --card:#101a2e;
  --gold:#d4a64f;
  --border:#24324d;
  --text:#eef2ff;
  --muted:#94a3b8;
  --red:#f87171;
  --green:#4ade80;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(135deg,#081120,#0b1730);color:var(--text);font-family:"Noto Sans TC",sans-serif; padding-bottom: 50px;}
.container{max-width:1400px;margin:auto;padding:20px; display: flex; flex-direction: column; gap: 30px;}

/* 標籤頁導航 */
.tabs { display: flex; gap: 10px; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px;}
.tab-btn { background: transparent; color: var(--muted); border: none; font-size: 1.2rem; cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: all 0.3s;}
.tab-btn.active { background: var(--card); color: var(--gold); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0;}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* 網格佈局 */
.grid-main { display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px;}
@media(max-width:900px){ .grid-main{grid-template-columns:1fr} }

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px; margin-bottom: 20px;}
.step{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:16px; display: flex; justify-content: space-between; align-items: center;}
label{display:block;color:#cbd5e1;margin-bottom:8px; font-size: 0.9rem;}
input,select,button{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:#0b1220;color:white; font-size: 1rem; transition: border 0.2s;}
input:focus, select:focus { border-color: var(--gold); outline: none;}
input:read-only { background-color: #1a2333; color: var(--muted); cursor: not-allowed; }
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* 按鈕樣式 */
button{background:var(--gold);color:#111;font-weight:700;cursor:pointer; border: none;}
button:hover { filter: brightness(1.1); transform: translateY(-1px); }
button.btn-outline { background: transparent; color: var(--gold); border: 1px dashed var(--gold); }
button.btn-danger { background: rgba(248, 113, 113, 0.1); color: var(--red); border: 1px solid var(--red); }
button.btn-sm { padding: 6px 12px; font-size: 0.8rem; width: auto;}

/* 動態新增明細的區塊樣式 */
.item-row { background: #152238; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; position: relative;}
.item-row:focus-within { border-color: var(--gold); }
.remove-btn { position: absolute; top: 12px; right: 12px; background: rgba(248, 113, 113, 0.1); color: var(--red); border: 1px solid var(--red); width: 32px; height: 32px; padding: 0; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
.remove-btn:hover { background: var(--red); color: white; }

/* 報價單/對帳單樣式 */
.invoice{ background:#fff; color:#111827; padding:32px; border-radius:18px; position: relative;}
.invoice-header { text-align: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 20px;}
.invoice-title { font-size: 1.5rem; font-weight: 800; color: #111827; margin: 0;}
.invoice-date { color: #6b7280; font-size: 0.9rem; margin-top: 4px;}
.invoice-customer { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; color: #374151;}

.invoice-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 16px;}
.invoice-item-name { font-weight: 700; font-size: 1.1rem; border-bottom: 1px dashed #d1d5db; padding-bottom: 8px; margin-bottom: 8px; color: #111827;}
.invoice-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.95rem; color: #4b5563;}
.invoice-row.minus { color: #16a34a; } /* 扣除項綠色 */
.invoice-row.plus { color: #dc2626; } /* 附加項紅色 */

.invoice-total-section { border-top: 2px solid #e5e7eb; padding-top: 20px; margin-top: 20px;}
.total-row { display: flex; justify-content: space-between; align-items: baseline;}
.total-label { font-size: 1.2rem; font-weight: 700; color: #374151;}
.total-amount { font-size: 2.5rem; font-weight: 800; color: #b8862f;}

/* 客戶列表 */
.customer-list { display: flex; flex-direction: column; gap: 10px; }
.customer-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #0b1220; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s;}
.customer-item:hover { border-color: var(--gold); }
.customer-item.active { border-color: var(--gold); background: rgba(212, 166, 79, 0.1); }
.customer-name { font-weight: 700; font-size: 1.1rem; }
.customer-summary { font-size: 0.9rem; color: var(--muted); }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #111; padding: 12px 24px; border-radius: 8px; font-weight: 700; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000;}
.toast.show { opacity: 1; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }

/* Modal 樣式 */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; width: 90%; max-width: 500px; }
.modal-title { font-size: 1.2rem; font-weight: 700; color: var(--gold); margin-bottom: 16px; margin-top: 0;}

</style>
</head>
<body>

<div id="toast" class="toast">訊息</div>

<!-- Datalist 用於購買人下拉選單自動完成 -->
<datalist id="buyerList"></datalist>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('calc')">1. 計算與加入明細</button>
        <button class="tab-btn" onclick="switchTab('orders')">2. 客戶對帳單 (合併品項)</button>
    </div>

    <!-- Tab 1: 計算器 -->
    <div id="tab-calc" class="tab-content active">
        <div class="grid-main">
            <!-- 左側：輸入表單 -->
            <div>
                <div class="card">
                    <div class="step">STEP 1｜成本來源（付款方式 / 幣別 / 國家）</div>
                    
                    <div class="grid2">
                        <div>
                            <label>付款方式</label>
                            <select id="payMode">
                                <option value="card">信用卡</option>
                                <option value="mobile">行動支付 (LINE Pay等)</option>
                                <option value="cash">現金</option>
                            </select>
                        </div>
                        <div>
                            <label>購買國家 / 稅率預設</label>
                            <select id="country">
                                <option value="JPY|日本|10">JPY（日本 10%）</option>
                                <option value="KRW|韓國|10">KRW（韓國 10%）</option>
                                <option value="USD|美國-Oregon|0">USD（美國免稅州 0%）</option>
                                <option value="USD|美國-California|7.25">USD（美國 CA 7.25%）</option>
                                <option value="EUR|法國|20">EUR（法國 20%）</option>
                                <option value="EUR|德國|19">EUR（德國 19%）</option>
                                <option value="GBP|英國|20">GBP（英國 20%）</option>
                                <option value="OTHER|自訂|0">其他自訂</option>
                            </select>
                        </div>
                    </div>

                    <!-- 信用卡區塊 -->
                    <div id="cardBox" class="grid2" style="margin-top:16px">
                        <div>
                            <label>整單收據外幣總額</label>
                            <input id="foreignAmount" type="number" placeholder="例: 10000">
                        </div>
                        <div>
                            <label>整單台幣扣款金額</label>
                            <input id="twdAmount" type="number" placeholder="例: 2200">
                        </div>
                    </div>

                    <!-- 行動支付區塊 -->
                    <div id="mobileBox" class="grid2" style="display:none;margin-top:16px">
                        <div>
                            <label>行動支付外幣總額</label>
                            <input id="mobileForeign" type="number" placeholder="例: 10000">
                        </div>
                        <div>
                            <label>行動支付台幣扣款</label>
                            <input id="mobileTwd" type="number" placeholder="例: 2200">
                        </div>
                        <div style="grid-column: span 2;">
                            <label>行動支付手續費率 (%)</label>
                            <input id="mobileFeeRate" type="number" step="0.1" value="0" placeholder="例: 1.5 (免手續費請填0)">
                        </div>
                    </div>

                    <!-- 現金區塊 -->
                    <div id="cashBox" class="grid2" style="display:none;margin-top:16px">
                        <div>
                            <label>換匯外幣金額</label>
                            <input id="cashForeign" type="number">
                        </div>
                        <div>
                            <label>實際換匯台幣</label>
                            <input id="cashTwd" type="number">
                        </div>
                    </div>

                    <div style="margin-top:16px; padding: 12px; background: #0b1220; border-radius: 8px; border: 1px solid var(--border);">
                        <span style="color: var(--muted); font-size: 0.9rem;">即時成本匯率：</span>
                        <span id="rateText" style="color: var(--gold); font-weight: 700; font-size: 1.1rem; margin-left: 10px;">等待輸入...</span>
                    </div>
                </div>

                <div class="card">
                    <div class="step">STEP 2｜退稅資訊</div>
                    <label>退稅計算方式</label>
                    <select id="taxType">
                        <option value="none">無退稅 (不扣抵)</option>
                        <option value="posttax">稅後退稅（需從報價中扣除）</option>
                        <option value="pretax">稅前免稅（現場已免稅，不扣抵）</option>
                        <option value="custom">其他自訂 (自行輸入退稅率)</option>
                    </select>

                    <div class="grid2" style="margin-top:16px">
                        <div>
                            <label>政府退稅率 (%)</label>
                            <input id="taxRate" type="number" step="0.1" readonly style="opacity: 0.5;">
                        </div>
                        <div>
                            <label>店家額外折扣 (%)</label>
                            <input id="storeDiscount" type="number" value="0" step="0.1" placeholder="例: 5">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="step">STEP 3｜商品明細清單 (可同時輸入多筆)</div>
                    
                    <!-- 多筆明細容器 -->
                    <div id="itemsContainer"></div>

                    <button class="btn-outline" onclick="createItemRow()" style="margin-top: 16px; padding: 14px; font-size: 1.1rem;">
                        ➕ 新增下一筆明細
                    </button>
                </div>

                <button onclick="calculatePreview()" style="padding: 18px; font-size: 1.3rem; margin-bottom: 20px;">
                    預覽清單報價
                </button>
            </div>

            <!-- 右側：清單預覽與加入 -->
            <div>
                <div class="card" style="position: sticky; top: 20px;">
                    <div class="step">預覽準備加入的明細</div>
                    
                    <div id="previewCard" class="invoice" style="min-height: 200px; padding: 24px;">
                        <div class="empty-state">請填寫左側資料並點擊「預覽清單報價」</div>
                    </div>

                    <div id="actionButtons" style="display: none; margin-top: 20px;">
                        <button onclick="addToOrder()" style="width: 100%; padding: 18px; font-size: 1.2rem;">
                            ✅ 確認將所有明細派發至客戶訂單
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab 2: 訂單管理與對帳單 -->
    <div id="tab-orders" class="tab-content">
        <div class="grid-main">
            <!-- 左側：客戶列表 -->
            <div>
                <div class="card">
                    <div class="step">選擇客戶</div>
                    <div id="customerList" class="customer-list">
                        <!-- 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 右側：合併對帳單 -->
            <div>
                <div class="card" style="position: sticky; top: 20px;">
                    <div class="step">
                        <span>專屬對帳單</span>
                        <button onclick="clearCurrentCustomer()" class="btn-sm btn-danger" id="btnClear" style="display: none;">清除此客訂單</button>
                    </div>

                    <div id="orderCard" class="invoice">
                        <div class="empty-state">請先從左側選擇一位客戶</div>
                    </div>

                    <div id="orderActionButtons" class="grid2" style="display:none; margin-top: 20px;">
                    <button class="btn-outline" onclick="copyTextOrder()">📋 複製文字明細</button>
                    <button onclick="copyImageOrder()">📸 產生對帳圖片</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 編輯與確認彈窗 -->
<div id="editModal" class="modal-overlay">
    <div class="modal-card">
        <h3 class="modal-title">編輯商品明細</h3>
        <div class="grid2" style="margin-bottom: 12px;">
            <div style="grid-column: span 2;">
                <label>商品名稱</label>
                <input id="editItemName" type="text">
            </div>
            <div>
                <label>單價 (外幣)</label>
                <input id="editItemPrice" type="number">
            </div>
            <div>
                <label>數量</label>
                <input id="editItemQty" type="number" min="1">
            </div>
            <div>
                <label>退稅率 (%)</label>
                <input id="editTaxRate" type="number" step="0.1" min="0">
            </div>
            <div>
                <label>店家折扣 (%)</label>
                <input id="editStoreDiscRate" type="number" step="0.1" min="0">
            </div>
            <div>
                <label>手續費率 (%)</label>
                <input id="editFeeRate" type="number" step="0.1" min="0">
            </div>
            <div>
                <label>代購服務費</label>
                <input id="editItemSvc" type="number">
            </div>
            <div style="grid-column: span 2;">
                <label>運費</label>
                <input id="editItemShip" type="number">
            </div>
        </div>
        <div class="grid2" style="margin-top: 20px;">
            <button class="btn-outline" onclick="closeModal('editModal')">取消</button>
            <button onclick="saveEditItem()">儲存變更</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-card">
        <h3 class="modal-title">確認操作</h3>
        <p id="confirmMessage" style="margin-bottom: 24px; line-height: 1.5; color: white;"></p>
        <div class="grid2">
            <button class="btn-outline" onclick="closeModal('confirmModal')">取消</button>
            <button id="confirmBtn" class="btn-danger">確定</button>
        </div>
    </div>
</div>

<div id="alertModal" class="modal-overlay">
    <div class="modal-card">
        <h3 class="modal-title">提示</h3>
        <p id="alertMessage" style="margin-bottom: 24px; line-height: 1.5; color: white;"></p>
        <button onclick="closeModal('alertModal')">確定</button>
    </div>
</div>

<script>
// --- 資料庫模擬與全域狀態 ---
let orders = JSON.parse(localStorage.getItem('agent_orders')) || {};
let currentPreviewItems = [];
let currentSelectedCustomer = null;

function saveOrders() {
    localStorage.setItem('agent_orders', JSON.stringify(orders));
    renderBuyerDatalist(); // 更新下拉選單的客戶清單
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// --- 自訂彈窗邏輯 ---
function customAlert(msg) {
    document.getElementById('alertMessage').innerText = msg;
    document.getElementById('alertModal').classList.add('show');
}

function customConfirm(msg, onConfirm) {
    document.getElementById('confirmMessage').innerText = msg;
    const btn = document.getElementById('confirmBtn');
    btn.onclick = () => {
        closeModal('confirmModal');
        onConfirm();
    };
    document.getElementById('confirmModal').classList.add('show');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('show');
}

// --- Tab 切換邏輯 ---
function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    event.currentTarget.classList.add('active');

    if (tabId === 'orders') {
        renderCustomerList();
    }
}

// --- 更新購買人下拉選單 (Datalist) ---
function renderBuyerDatalist() {
    const datalist = document.getElementById('buyerList');
    const allBuyers = Object.keys(orders);
    datalist.innerHTML = allBuyers.map(name => `<option value="${name}"></option>`).join('');
}


// --- 動態新增商品明細邏輯 ---
function createItemRow() {
    const container = document.getElementById('itemsContainer');
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
        <button class="remove-btn" onclick="removeItemRow(this)" title="移除此明細">✖</button>
        <div class="grid2">
            <div>
                <label>購買人 (下拉選擇或輸入新名字)</label>
                <input class="item-buyer" list="buyerList" placeholder="例: 林小姐">
            </div>
            <div>
                <label>商品名稱</label>
                <input class="item-name" placeholder="例: Dior 短夾">
            </div>
        </div>
        <div class="grid2" style="margin-top:16px">
            <div>
                <label>商品單價（外幣）</label>
                <input class="item-price" type="number" placeholder="例: 85000">
            </div>
            <div>
                <label>數量</label>
                <input class="item-qty" type="number" value="1" min="1">
            </div>
        </div>
        <div class="grid2" style="margin-top:16px; border-top: 1px solid var(--border); padding-top: 16px;">
            <div>
                <label>代購服務費 (台幣)</label>
                <input class="item-svc" type="number" value="0">
            </div>
            <div>
                <label>運費 (台幣)</label>
                <input class="item-ship" type="number" value="0">
            </div>
        </div>
    `;
    container.appendChild(row);
    updateRemoveButtons();
}

function removeItemRow(btn) {
    btn.closest('.item-row').remove();
    updateRemoveButtons();
}

function updateRemoveButtons() {
    const rows = document.querySelectorAll('.item-row');
    rows.forEach(row => {
        const btn = row.querySelector('.remove-btn');
        // 如果只有一列，隱藏移除按鈕
        btn.style.display = rows.length === 1 ? 'none' : 'flex';
    });
}

// 頁面載入時初始化
renderBuyerDatalist();
createItemRow();


// --- 退稅與國家連動邏輯 ---
const country = document.getElementById('country');
const taxType = document.getElementById('taxType');
const taxRate = document.getElementById('taxRate');

function updateTaxUI() {
    const type = taxType.value;
    const defaultRate = parseFloat(country.value.split('|')[2]) || 0;

    if (type === 'none') {
        taxRate.value = 0;
        taxRate.readOnly = true;
        taxRate.style.opacity = '0.5';
    } else if (type === 'custom') {
        taxRate.readOnly = false;
        taxRate.style.opacity = '1';
    } else {
        taxRate.value = defaultRate;
        taxRate.readOnly = true;
        taxRate.style.opacity = '0.5';
    }
}

country.onchange = () => {
    const rate = country.value.split('|')[2];
    if (rate == 0) {
        taxType.value = 'none';
    } else {
        taxType.value = country.value.includes('日本') ? 'pretax' : 'posttax';
    }
    updateTaxUI();
};
taxType.onchange = updateTaxUI;
country.onchange();


// --- 匯率與付款方式邏輯 ---
const payMode = document.getElementById('payMode');
const foreignAmount = document.getElementById('foreignAmount');
const twdAmount = document.getElementById('twdAmount');
const mobileForeign = document.getElementById('mobileForeign');
const mobileTwd = document.getElementById('mobileTwd');
const cashForeign = document.getElementById('cashForeign');
const cashTwd = document.getElementById('cashTwd');
const rateText = document.getElementById('rateText');

function updateRateUI(){
    const r = getRate();
    rateText.innerText = r ? `1 外幣 = ${r.toFixed(5)} TWD` : '等待輸入...';
}

payMode.onchange = () => {
    document.getElementById('cardBox').style.display = payMode.value === 'card' ? 'grid' : 'none';
    document.getElementById('mobileBox').style.display = payMode.value === 'mobile' ? 'grid' : 'none';
    document.getElementById('cashBox').style.display = payMode.value === 'cash' ? 'grid' : 'none';
    updateRateUI();
};

[foreignAmount, twdAmount, mobileForeign, mobileTwd, cashForeign, cashTwd].forEach(el => {
    if(el) el.addEventListener('input', updateRateUI);
});

function getRate(){
    if(payMode.value === 'card'){
        if(+foreignAmount.value && +twdAmount.value) return +twdAmount.value / +foreignAmount.value;
    } else if (payMode.value === 'mobile') {
        if(+mobileForeign.value && +mobileTwd.value) return +mobileTwd.value / +mobileForeign.value;
    } else {
        if(+cashForeign.value && +cashTwd.value) return +cashTwd.value / +cashForeign.value;
    }
    return 0;
}


// --- 核心計算預覽邏輯 (處理多筆陣列) ---
function calculatePreview(){
    const rate = getRate();
    if(!rate){ customAlert('請先填寫上方匯率成本資料'); return; }
    
    const rows = document.querySelectorAll('.item-row');
    currentPreviewItems = [];
    let previewHtml = '';

    for(let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const buyer = row.querySelector('.item-buyer').value.trim();
        const itemName = row.querySelector('.item-name').value.trim();
        const price = +row.querySelector('.item-price').value || 0;
        const qty = +row.querySelector('.item-qty').value || 1;
        const svc = +row.querySelector('.item-svc').value || 0;
        const ship = +row.querySelector('.item-ship').value || 0;

        if(!buyer) { customAlert(`第 ${i+1} 筆明細：請選擇或輸入購買人`); return; }
        if(!itemName) { customAlert(`第 ${i+1} 筆明細：請填寫商品名稱`); return; }
        if(price <= 0) { customAlert(`第 ${i+1} 筆明細：請填寫商品單價`); return; }

        const base = price * qty * rate;
        
        // 退稅計算
        const taxTypeValue = taxType.value;
        const taxValue = parseFloat(taxRate.value || 0);
        let gov = 0;
        if(taxTypeValue === 'posttax'){
            gov = Math.round(base * (taxValue / (100 + taxValue)));
        } else if (taxTypeValue === 'custom') {
            gov = Math.round(base * (taxValue / 100));
        }

        const storeDiscRateVal = (+document.getElementById('storeDiscount').value || 0);
        const store = Math.round(base * (storeDiscRateVal / 100));
        
        // 手續費
        let paymentFee = 0;
        let paymentFeeLabel = '';
        const payModeVal = payMode.value;
        const mobileFeeRateVal = parseFloat(document.getElementById('mobileFeeRate').value || 0);

        if (payModeVal === 'card') {
            paymentFee = Math.round(base * 0.015);
            paymentFeeLabel = '刷卡手續費 (1.5%)';
        } else if (payModeVal === 'mobile') {
            paymentFee = Math.round(base * (mobileFeeRateVal / 100));
            paymentFeeLabel = mobileFeeRateVal > 0 ? `行動支付手續費 (${mobileFeeRateVal}%)` : '';
        }
        
        const total = Math.round(base - gov - store + paymentFee + svc + ship);
        const currency = country.value.split('|')[0];

        currentPreviewItems.push({
            id: Date.now().toString() + i,
            buyer, itemName, price, qty, rate, base, gov, store, 
            paymentFee, paymentFeeLabel, svc, ship, total,
            currency: currency, 
            taxRate: taxValue,
            taxType: taxTypeValue,
            storeDiscRate: storeDiscRateVal,
            payModeValue: payModeVal,
            mobileFeeRateValue: mobileFeeRateVal
        });

        // 堆疊預覽 HTML
        previewHtml += `
            <div class="invoice-item" style="padding: 16px;">
                <div style="font-weight: 800; color: #b8862f; font-size: 1.1rem; margin-bottom: 8px;">👤 給：${buyer}</div>
                <div class="invoice-item-name" style="border-bottom:none; padding-bottom:0; font-size: 1.1rem; margin-bottom: 12px;">商品名稱：${itemName} (x${qty})</div>
                
                <div style="border: 2px solid #94a3b8; border-radius: 8px; padding: 12px; margin-bottom: 12px; background: #fff;">
                    <div class="invoice-row"><span>當地金額</span><span style="font-weight:bold; color:#111;">${price.toLocaleString()} ${currency}</span></div>
                    <div class="invoice-row"><span>台幣換算金額</span><span style="font-weight:bold; color:#111;">NT$ ${Math.round(base).toLocaleString()}</span></div>
                    <div class="invoice-row" style="margin-bottom:0;"><span>換算匯率</span><span style="font-weight:bold; color:#111;">${rate.toFixed(5)}</span></div>
                </div>

                ${paymentFee > 0 ? `<div class="invoice-row plus"><span>${paymentFeeLabel}</span><span>+ NT$ ${paymentFee.toLocaleString()}</span></div>` : ''}
                ${gov > 0 ? `<div class="invoice-row minus"><span>退稅 ${taxValue}%</span><span>- NT$ ${gov.toLocaleString()}</span></div>` : ''}
                ${store > 0 ? `<div class="invoice-row minus"><span>店家折扣</span><span>- NT$ ${store.toLocaleString()}</span></div>` : ''}
                ${svc > 0 ? `<div class="invoice-row plus"><span>代購服務費</span><span>+ NT$ ${svc.toLocaleString()}</span></div>` : ''}
                ${ship > 0 ? `<div class="invoice-row plus"><span>運費</span><span>+ NT$ ${ship.toLocaleString()}</span></div>` : ''}
                <div style="text-align:right; font-weight:800; font-size:1.2rem; color:#111; margin-top:12px; border-top: 2px dashed #e5e7eb; padding-top: 12px;">商品小計: NT$ ${total.toLocaleString()}</div>
            </div>
        `;
    }

    document.getElementById('previewCard').innerHTML = `
        <div class="invoice-header" style="padding-bottom: 10px; margin-bottom: 15px;">
            <h3 class="invoice-title">已準備 ${currentPreviewItems.length} 筆明細</h3>
        </div>
        ${previewHtml}
    `;

    document.getElementById('actionButtons').style.display = 'block';
}

// 將陣列中的明細派發至訂單
function addToOrder() {
    if(currentPreviewItems.length === 0) return;
    
    currentPreviewItems.forEach(item => {
        if(!orders[item.buyer]) {
            orders[item.buyer] = [];
        }
        orders[item.buyer].push(JSON.parse(JSON.stringify(item)));
    });
    
    saveOrders();
    showToast(`✅ 已將 ${currentPreviewItems.length} 筆明細成功派發至客戶訂單`);
    
    // 清空輸入表單，保留一個空的
    document.getElementById('itemsContainer').innerHTML = '';
    createItemRow();
    
    document.getElementById('previewCard').innerHTML = '<div class="empty-state">明細已全部派發！<br>您可以繼續新增下一批，或切換至對帳單查看。</div>';
    document.getElementById('actionButtons').style.display = 'none';
    currentPreviewItems = [];
}

// --- 客戶與對帳單邏輯 ---

function renderCustomerList() {
    const listHtml = Object.keys(orders).map(name => {
        const items = orders[name];
        const totalAmount = items.reduce((sum, item) => sum + item.total, 0);
        const isActive = currentSelectedCustomer === name ? 'active' : '';
        return `
            <div class="customer-item ${isActive}" onclick="selectCustomer('${name}')">
                <div>
                    <div class="customer-name">${name}</div>
                    <div class="customer-summary">${items.length} 件商品</div>
                </div>
                <div style="font-weight: 700; color: var(--gold);">
                    NT$ ${totalAmount.toLocaleString()}
                </div>
            </div>
        `;
    }).join('');

    document.getElementById('customerList').innerHTML = listHtml || '<div class="empty-state">目前沒有任何客戶訂單</div>';
}

function selectCustomer(name) {
    currentSelectedCustomer = name;
    renderCustomerList(); 
    renderOrderInvoice(name);
}

function renderOrderInvoice(name) {
    const items = orders[name];
    if(!items || items.length === 0) return;

    const today = new Date().toLocaleDateString('zh-TW');
    const grandTotal = items.reduce((sum, item) => sum + item.total, 0);

    let itemsHtml = items.map((item, index) => {
        // 相容舊資料可能沒有 paymentFee 的問題
        const fee = item.paymentFee !== undefined ? item.paymentFee : (item.cc || 0);
        const feeLabel = item.paymentFeeLabel || '刷卡手續費';
        const taxRateDisplay = item.taxRate !== undefined ? item.taxRate : '0';

        return `
        <div class="invoice-item" style="padding: 16px; position: relative;">
            <!-- 加入 data-html2canvas-ignore="true" 讓截圖套件自動忽略此按鈕區塊 -->
            <div data-html2canvas-ignore="true" style="position: absolute; top: 12px; right: 12px; display: flex; gap: 8px;">
                <button onclick="openEditItem('${name}', ${index})" class="btn-sm btn-outline" style="padding: 4px 8px; font-size: 0.8rem; background: #fff;">編輯</button>
                <button onclick="deleteOrderItem('${name}', ${index})" class="btn-sm btn-danger" style="padding: 4px 8px; font-size: 0.8rem; background: #fff;">刪除</button>
            </div>
            <div class="invoice-item-name" style="font-size: 1.1rem; border-bottom: none; padding-bottom: 0; margin-bottom: 12px; padding-right: 90px;">商品名稱：${item.itemName} (x${item.qty})</div>
            
            <div style="border: 2px solid #94a3b8; border-radius: 8px; padding: 12px; margin-bottom: 12px; background: #fff;">
                <div class="invoice-row"><span>當地金額</span><span style="font-weight:bold; color:#111;">${item.price.toLocaleString()} ${item.currency}</span></div>
                <div class="invoice-row"><span>台幣換算金額</span><span style="font-weight:bold; color:#111;">NT$ ${Math.round(item.base).toLocaleString()}</span></div>
                <div class="invoice-row" style="margin-bottom:0;"><span>換算匯率</span><span style="font-weight:bold; color:#111;">${item.rate.toFixed(5)}</span></div>
            </div>

            ${fee > 0 ? `<div class="invoice-row plus"><span>${feeLabel}</span><span>+ NT$ ${fee.toLocaleString()}</span></div>` : ''}
            ${item.gov > 0 ? `<div class="invoice-row minus"><span>退稅 ${taxRateDisplay}%</span><span>- NT$ ${item.gov.toLocaleString()}</span></div>` : ''}
            ${item.store > 0 ? `<div class="invoice-row minus"><span>店家折扣</span><span>- NT$ ${item.store.toLocaleString()}</span></div>` : ''}
            ${item.svc > 0 ? `<div class="invoice-row plus"><span>代購服務費</span><span>+ NT$ ${item.svc.toLocaleString()}</span></div>` : ''}
            ${item.ship > 0 ? `<div class="invoice-row plus"><span>運費</span><span>+ NT$ ${item.ship.toLocaleString()}</span></div>` : ''}
            <div style="text-align:right; font-weight:800; font-size:1.2rem; color:#111; margin-top:12px; border-top: 2px dashed #e5e7eb; padding-top: 12px;">商品小計: NT$ ${item.total.toLocaleString()}</div>
        </div>
        `;
    }).join('');

    document.getElementById('orderCard').innerHTML = `
        <div class="invoice-header">
            <h2 class="invoice-title">代購明細一覽</h2>
            <div class="invoice-date">建立日期：${today}</div>
        </div>
        <div class="invoice-customer">致：${name}</div>
        
        <div style="margin-bottom: 20px;">
            ${itemsHtml}
        </div>
        
        <div class="invoice-total-section">
            <div class="total-row">
                <span class="total-label">應付總額</span>
                <span class="total-amount">NT$ ${grandTotal.toLocaleString()}</span>
            </div>
            <p style="text-align: center; color: #9ca3af; font-size: 0.8rem; margin-top: 10px;">感謝您的委託，請確認以上明細</p>
        </div>
    `;

    document.getElementById('orderActionButtons').style.display = 'grid';
    document.getElementById('btnClear').style.display = 'inline-block';
}

// --- 編輯與刪除邏輯 ---
function deleteOrderItem(name, index) {
    customConfirm(`確定要刪除「${orders[name][index].itemName}」這筆明細嗎？`, () => {
        orders[name].splice(index, 1);
        if (orders[name].length === 0) {
            delete orders[name];
            currentSelectedCustomer = null;
            document.getElementById('orderCard').innerHTML = '<div class="empty-state">請先從左側選擇一位客戶</div>';
            document.getElementById('orderActionButtons').style.display = 'none';
            document.getElementById('btnClear').style.display = 'none';
        }
        saveOrders();
        renderCustomerList();
        if (currentSelectedCustomer) renderOrderInvoice(currentSelectedCustomer);
        showToast('🗑️ 已刪除明細');
    });
}

let editContext = { name: null, index: null };
function openEditItem(name, index) {
    editContext = { name, index };
    const item = orders[name][index];
    
    // 為了支援舊資料並修正資料遺失問題，若找不到 % 數設定，自動從金額反推算率
    let derivedTaxRate = item.taxRate || 0;
    let derivedStoreDiscRate = item.storeDiscRate !== undefined ? item.storeDiscRate : (item.base && item.store ? (item.store / item.base) * 100 : 0);
    let derivedFeeRate = 0;
    if (item.payModeValue === 'card') derivedFeeRate = 1.5;
    else if (item.payModeValue === 'mobile') derivedFeeRate = item.mobileFeeRateValue || 0;
    else if (item.paymentFee > 0 && item.base) derivedFeeRate = (item.paymentFee / item.base) * 100;
    
    document.getElementById('editItemName').value = item.itemName;
    document.getElementById('editItemPrice').value = item.price;
    document.getElementById('editItemQty').value = item.qty;
    document.getElementById('editTaxRate').value = derivedTaxRate.toFixed(2).replace(/\.00$/, '');
    document.getElementById('editStoreDiscRate').value = derivedStoreDiscRate.toFixed(2).replace(/\.00$/, '');
    document.getElementById('editFeeRate').value = derivedFeeRate.toFixed(2).replace(/\.00$/, '');
    document.getElementById('editItemSvc').value = item.svc;
    document.getElementById('editItemShip').value = item.ship;
    document.getElementById('editModal').classList.add('show');
}

function saveEditItem() {
    const { name, index } = editContext;
    if(!name || index === null) return;
    
    const item = orders[name][index];
    item.itemName = document.getElementById('editItemName').value.trim() || '未命名商品';
    item.price = +document.getElementById('editItemPrice').value || 0;
    item.qty = +document.getElementById('editItemQty').value || 1;
    
    // 取得使用者編輯的率
    const taxRate = +document.getElementById('editTaxRate').value || 0;
    const storeDiscRate = +document.getElementById('editStoreDiscRate').value || 0;
    const feeRate = +document.getElementById('editFeeRate').value || 0;
    
    item.svc = +document.getElementById('editItemSvc').value || 0;
    item.ship = +document.getElementById('editItemShip').value || 0;

    // 重新計算基礎金額
    item.base = item.price * item.qty * item.rate;
    
    // 更新狀態
    item.taxRate = taxRate;
    item.storeDiscRate = storeDiscRate;
    
    // 判斷退稅處理
    if (taxRate > 0 && (!item.taxType || item.taxType === 'none' || item.taxType === 'pretax')) {
        // 如果原本沒退稅，但編輯時加上了退稅率，自動轉為 custom 扣抵
        item.taxType = 'custom';
    } else if (taxRate === 0) {
        item.taxType = 'none';
    }
    
    if (item.taxType === 'posttax') {
        item.gov = Math.round(item.base * (taxRate / (100 + taxRate)));
    } else if (item.taxType === 'custom') {
        item.gov = Math.round(item.base * (taxRate / 100));
    } else {
        item.gov = 0; 
    }

    item.store = Math.round(item.base * (storeDiscRate / 100));

    // 更新手續費
    item.paymentFee = Math.round(item.base * (feeRate / 100));
    if (feeRate > 0) {
        item.payModeValue = feeRate === 1.5 ? 'card' : 'mobile';
        item.mobileFeeRateValue = feeRate;
        item.paymentFeeLabel = feeRate === 1.5 ? '刷卡手續費 (1.5%)' : `手續費 (${feeRate}%)`;
    } else {
        item.payModeValue = 'cash';
        item.mobileFeeRateValue = 0;
        item.paymentFeeLabel = '';
    }

    item.total = Math.round(item.base - item.gov - item.store + item.paymentFee + item.svc + item.ship);

    saveOrders();
    renderCustomerList();
    renderOrderInvoice(name);
    closeModal('editModal');
    showToast('✅ 明細已更新');
}

function clearCurrentCustomer() {
    customConfirm(`確定要清除 ${currentSelectedCustomer} 的所有訂單紀錄嗎？`, () => {
        delete orders[currentSelectedCustomer];
        saveOrders();

        currentSelectedCustomer = null;
        renderCustomerList();
        document.getElementById('orderCard').innerHTML = '<div class="empty-state">請先從左側選擇一位客戶</div>';
        document.getElementById('orderActionButtons').style.display = 'none';
        document.getElementById('btnClear').style.display = 'none';
        showToast('🗑️ 訂單已清除');
    });
}

// --- 匯出功能 ---

async function copyTextOrder(){
    if(!currentSelectedCustomer || !orders[currentSelectedCustomer]) return;
    
    const items = orders[currentSelectedCustomer];
    const grandTotal = items.reduce((sum, item) => sum + item.total, 0);
    
    let text = `【代購明細一覽】\n購買人：${currentSelectedCustomer}\n================\n`;
    
    items.forEach(item => {
        const fee = item.paymentFee !== undefined ? item.paymentFee : (item.cc || 0);
        const feeLabel = item.paymentFeeLabel || '刷卡手續費';
        const taxRateDisplay = item.taxRate !== undefined ? item.taxRate : '0';

        text += `▪ 商品名稱：${item.itemName} (x${item.qty})\n`;
        text += `  當地金額：${item.price.toLocaleString()} ${item.currency}\n`;
        text += `  台幣換算金額：NT$ ${Math.round(item.base).toLocaleString()}\n`;
        text += `  換算匯率：${item.rate.toFixed(5)}\n`;
        if (fee > 0) text += `  ${feeLabel}：+NT$ ${fee.toLocaleString()}\n`;
        if (item.gov > 0) text += `  退稅 ${taxRateDisplay}%：-NT$ ${item.gov.toLocaleString()}\n`;
        if (item.store > 0) text += `  店家折扣：-NT$ ${item.store.toLocaleString()}\n`;
        if (item.svc > 0) text += `  代購服務費：+NT$ ${item.svc.toLocaleString()}\n`;
        if (item.ship > 0) text += `  運費：+NT$ ${item.ship.toLocaleString()}\n`;
        text += `  商品小計：NT$ ${item.total.toLocaleString()}\n\n`;
    });
    
    text += `================\n應付總計：NT$ ${grandTotal.toLocaleString()}\n`;
    text += `(點擊圖片查看詳細各項費用扣抵明細)`;
    
    await navigator.clipboard.writeText(text);
    showToast('📋 文字明細已複製，可直接貼上');
}

async function copyImageOrder(){
    if(!currentSelectedCustomer) return;
    
    const target = document.getElementById('orderCard');
    const btn = event.currentTarget;
    const originalText = btn.innerText;
    
    btn.innerText = '圖片產生中...';
    btn.disabled = true;

    try {
        const canvas = await html2canvas(target, { scale: 2 });
        canvas.toBlob(async(blob) => {
            if(!blob) throw new Error('Blob 生成失敗');
            await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
            showToast('📸 對帳圖片已複製！請至聊天室貼上');
        });
    } catch(e) {
        customAlert('複製圖片失敗，您的瀏覽器可能不支援此功能，請嘗試截圖。');
        console.error(e);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
</script>
