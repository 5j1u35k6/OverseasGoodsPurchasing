
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Pro 2.3 正式版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
--bg:#081120;
--card:#101a2e;
--gold:#d4a64f;
--border:#24324d;
--text:#eef2ff;
--muted:#94a3b8;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(135deg,#081120,#0b1730);color:var(--text);font-family:"Noto Sans TC",sans-serif}
.container{max-width:1400px;margin:auto;padding:20px;display:grid;grid-template-columns:1.2fr .8fr;gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px}
.step{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:12px}
label{display:block;color:#cbd5e1;margin-bottom:6px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:#0b1220;color:white}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{background:var(--gold);color:#111;font-weight:700;cursor:pointer}
.invoice{
background:#fff;
color:#111827;
padding:24px;
border-radius:18px;
}
.invoice *{color:inherit}
.total{font-size:2.2rem;font-weight:800;color:#b8862f!important}
@media(max-width:900px){
.container{grid-template-columns:1fr}
.grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">

<div>

<div class="card">
<div class="step">STEP 1｜付款方式</div>
<label>付款方式</label>
<select id="payMode">
<option value="card">信用卡</option>
<option value="cash">現金</option>
</select>
</div>

<div class="card">
<div class="step">STEP 2｜成本來源（幣別 / 國家）</div>

<label>幣別 / 國家</label>
<select id="country">
<option value="JPY|日本|10">JPY（日本）</option>
<option value="KRW|韓國|10">KRW（韓國）</option>
<option value="USD|美國-Oregon|0">USD（美國 Oregon）</option>
<option value="USD|美國-California|7.25">USD（美國 California）</option>
<option value="USD|美國-Texas|6.25">USD（美國 Texas）</option>
<option value="EUR|法國|20">EUR（法國）</option>
<option value="EUR|德國|19">EUR（德國）</option>
<option value="GBP|英國|20">GBP（英國）</option>
</select>

<div id="cardBox" class="grid2" style="margin-top:12px">
<div>
<label>整單收據外幣總額</label>
<input id="foreignAmount" type="number">
</div>
<div>
<label>整單台幣扣款金額</label>
<input id="twdAmount" type="number">
</div>
</div>

<div id="cashBox" class="grid2" style="display:none;margin-top:12px">
<div>
<label>換匯外幣金額</label>
<input id="cashForeign" type="number">
</div>
<div>
<label>實際換匯台幣</label>
<input id="cashTwd" type="number">
</div>
</div>

<label style="margin-top:10px">即時成本匯率</label>
<input id="rateText" readonly>
</div>

<div class="card">
<div class="step">STEP 3｜退稅資訊</div>
<label>退稅類型</label>
<select id="taxType">
<option value="none">無退稅</option>
<option value="posttax">稅後退稅（需從總額扣除）</option>
<option value="pretax">稅前免稅（現場已扣除）</option>
</select>

<div class="grid2" style="margin-top:12px">
<div>
<label>政府退稅率 (%)</label>
<input id="taxRate" type="number">
</div>
<div>
<label>店家額外折扣 (%)</label>
<input id="storeDiscount" type="number" value="0">
</div>
</div>
</div>

<div class="card">
<div class="step">STEP 4｜商品資訊</div>
<div class="grid2">
<div><label>購買人</label><input id="buyer"></div>
<div><label>商品名稱</label><input id="item"></div>
</div>
<div class="grid2" style="margin-top:12px">
<div><label>商品單價（外幣）</label><input id="price" type="number"></div>
<div><label>數量</label><input id="qty" type="number" value="1"></div>
</div>
</div>

<div class="card">
<div class="step">STEP 5｜附加費用</div>
<div class="grid2">
<div><label>代購服務費</label><input id="serviceFee" type="number" value="0"></div>
<div><label>運費</label><input id="shippingFee" type="number" value="0"></div>
</div>
</div>

<div class="card">
<button onclick="calculate()">產生報價</button>
</div>

</div>

<div>
<div class="card">
<div class="step">STEP 6｜報價結果</div>

<div id="quoteCard" class="invoice">
尚未產生報價
</div>

<div class="grid2" style="margin-top:12px">
<button onclick="copyText()">複製文字</button>
<button onclick="copyImage()">複製圖片</button>
</div>
</div>
</div>

</div>

<script>
let quote='';

function updateRate(){
let r=0;
if(payMode.value==='card'){
 if(+foreignAmount.value && +twdAmount.value) r=+twdAmount.value/+foreignAmount.value;
}else{
 if(+cashForeign.value && +cashTwd.value) r=+cashTwd.value/+cashForeign.value;
}
rateText.value=r?('1 外幣 = '+r.toFixed(5)+' TWD'):'等待輸入';
}

payMode.onchange=()=>{
cardBox.style.display=payMode.value==='card'?'grid':'none';
cashBox.style.display=payMode.value==='cash'?'grid':'none';
updateRate();
};

country.onchange=()=>{
taxRate.value=country.value.split('|')[2];
};
country.onchange();

document.addEventListener('input',updateRate);

function getRate(){
if(payMode.value==='card'){
 return +twdAmount.value/+foreignAmount.value;
}
return +cashTwd.value/+cashForeign.value;
}

function calculate(){
const rate=getRate();
if(!rate){alert('請先輸入成本資料');return;}

const base=(+price.value||0)*(+qty.value||1)*rate;
const tax=parseFloat(taxRate.value||0);

let gov=0;
if(taxType.value==='posttax'){
 gov=Math.round(base*(tax/(100+tax)));
}

const store=Math.round(base*((+storeDiscount.value||0)/100));
const cc=payMode.value==='card'?Math.round(base*0.015):0;

const total=Math.round(base-gov-store+cc+(+serviceFee.value||0)+(+shippingFee.value||0));

quoteCard.innerHTML=`
<h2>代購商品明細</h2>
<p>購買人：${buyer.value}</p>
<p>商品：${item.value}</p>
<hr>
<p>商品成本：NT$ ${Math.round(base).toLocaleString()}</p>
<p>刷卡成本：NT$ ${cc.toLocaleString()}</p>
<p>政府退稅：- NT$ ${gov.toLocaleString()}</p>
<p>店家折扣：- NT$ ${store.toLocaleString()}</p>
<p>代購費：NT$ ${(+serviceFee.value||0).toLocaleString()}</p>
<p>運費：NT$ ${(+shippingFee.value||0).toLocaleString()}</p>
<hr>
<div class="total">NT$ ${total.toLocaleString()}</div>
`;

quote=quoteCard.innerText;
}

async function copyText(){
if(!quote) return;
await navigator.clipboard.writeText(quote);
alert('已複製');
}

async function copyImage(){
const canvas=await html2canvas(document.getElementById('quoteCard'));
canvas.toBlob(async(blob)=>{
await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
alert('圖片已複製');
});
}
</script>

</body>
</html>
