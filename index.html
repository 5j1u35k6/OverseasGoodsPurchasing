<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Overseas Goods Purchasing Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#081120;
  --card:#101a2e;
  --gold:#d4a64f;
  --border:#24324d;
  --text:#eef2ff;
  --muted:#94a3b8;
  --red:#f87171;
  --green:#4ade80;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(135deg,#081120,#0b1730);color:var(--text);font-family:"Noto Sans TC",sans-serif; padding-bottom: 50px;}
.container{max-width:1400px;margin:auto;padding:20px; display: flex; flex-direction: column; gap: 30px;}

/* 標籤頁導航 */
.tabs { display: flex; gap: 10px; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px;}
.tab-btn { background: transparent; color: var(--muted); border: none; font-size: 1.2rem; cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: all 0.3s;}
.tab-btn.active { background: var(--card); color: var(--gold); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0;}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* 網格佈局 */
.grid-main { display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px;}
@media(max-width:900px){ .grid-main{grid-template-columns:1fr} }

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px; margin-bottom: 20px;}
.step{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:16px; display: flex; justify-content: space-between; align-items: center;}
label{display:block;color:#cbd5e1;margin-bottom:8px; font-size: 0.9rem;}
input,select,button{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:#0b1220;color:white; font-size: 1rem; transition: border 0.2s;}
input:focus, select:focus { border-color: var(--gold); outline: none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* 按鈕樣式 */
button{background:var(--gold);color:#111;font-weight:700;cursor:pointer; border: none;}
button:hover { filter: brightness(1.1); transform: translateY(-1px); }
button.btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
button.btn-danger { background: rgba(248, 113, 113, 0.1); color: var(--red); border: 1px solid var(--red); }
button.btn-sm { padding: 6px 12px; font-size: 0.8rem; width: auto;}

/* 報價單/對帳單樣式 */
.invoice{ background:#fff; color:#111827; padding:32px; border-radius:18px; position: relative;}
.invoice-header { text-align: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 20px;}
.invoice-title { font-size: 1.5rem; font-weight: 800; color: #111827; margin: 0;}
.invoice-date { color: #6b7280; font-size: 0.9rem; margin-top: 4px;}
.invoice-customer { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; color: #374151;}

.invoice-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 16px;}
.invoice-item-name { font-weight: 700; font-size: 1.1rem; border-bottom: 1px dashed #d1d5db; padding-bottom: 8px; margin-bottom: 8px; color: #111827;}
.invoice-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.95rem; color: #4b5563;}
.invoice-row.minus { color: #16a34a; } /* 扣除項綠色 */
.invoice-row.plus { color: #dc2626; } /* 附加項紅色 */

.invoice-total-section { border-top: 2px solid #e5e7eb; padding-top: 20px; margin-top: 20px;}
.total-row { display: flex; justify-content: space-between; align-items: baseline;}
.total-label { font-size: 1.2rem; font-weight: 700; color: #374151;}
.total-amount { font-size: 2.5rem; font-weight: 800; color: #b8862f;}

/* 客戶列表 */
.customer-list { display: flex; flex-direction: column; gap: 10px; }
.customer-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #0b1220; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s;}
.customer-item:hover { border-color: var(--gold); }
.customer-item.active { border-color: var(--gold); background: rgba(212, 166, 79, 0.1); }
.customer-name { font-weight: 700; font-size: 1.1rem; }
.customer-summary { font-size: 0.9rem; color: var(--muted); }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #111; padding: 12px 24px; border-radius: 8px; font-weight: 700; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000;}
.toast.show { opacity: 1; }

.empty-state { text-align: center; padding: 40px; color: var(--muted); }

</style>
</head>
<body>

<div id="toast" class="toast">訊息</div>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('calc')">1. 計算與加入</button>
        <button class="tab-btn" onclick="switchTab('orders')">2. 客戶對帳單 (合併品項)</button>
    </div>

    <!-- Tab 1: 計算器 -->
    <div id="tab-calc" class="tab-content active">
        <div class="grid-main">
            <!-- 左側：輸入表單 -->
            <div>
                <div class="card">
                    <div class="step">STEP 1｜成本來源（付款方式 / 幣別 / 國家）</div>
                    
                    <div class="grid2">
                        <div>
                            <label>付款方式</label>
                            <select id="payMode">
                                <option value="card">信用卡</option>
                                <option value="cash">現金</option>
                            </select>
                        </div>
                        <div>
                            <label>購買國家 / 稅率預設</label>
                            <select id="country">
                                <option value="JPY|日本|10">JPY（日本 10%）</option>
                                <option value="KRW|韓國|10">KRW（韓國 10%）</option>
                                <option value="USD|美國-Oregon|0">USD（美國免稅州 0%）</option>
                                <option value="USD|美國-California|7.25">USD（美國 CA 7.25%）</option>
                                <option value="EUR|法國|20">EUR（法國 20%）</option>
                                <option value="EUR|德國|19">EUR（德國 19%）</option>
                                <option value="GBP|英國|20">GBP（英國 20%）</option>
                                <option value="OTHER|自訂|0">其他自訂</option>
                            </select>
                        </div>
                    </div>

                    <div id="cardBox" class="grid2" style="margin-top:16px">
                        <div>
                            <label>整單收據外幣總額</label>
                            <input id="foreignAmount" type="number" placeholder="例: 10000">
                        </div>
                        <div>
                            <label>整單台幣扣款金額</label>
                            <input id="twdAmount" type="number" placeholder="例: 2200">
                        </div>
                    </div>

                    <div id="cashBox" class="grid2" style="display:none;margin-top:16px">
                        <div>
                            <label>換匯外幣金額</label>
                            <input id="cashForeign" type="number">
                        </div>
                        <div>
                            <label>實際換匯台幣</label>
                            <input id="cashTwd" type="number">
                        </div>
                    </div>

                    <div style="margin-top:16px; padding: 12px; background: #0b1220; border-radius: 8px; border: 1px solid var(--border);">
                        <span style="color: var(--muted); font-size: 0.9rem;">即時成本匯率：</span>
                        <span id="rateText" style="color: var(--gold); font-weight: 700; font-size: 1.1rem; margin-left: 10px;">等待輸入...</span>
                    </div>
                </div>

                <div class="card">
                    <div class="step">STEP 2｜退稅資訊</div>
                    <label>退稅計算方式</label>
                    <select id="taxType">
                        <option value="none">無退稅 (不扣抵)</option>
                        <option value="posttax">稅後退稅（需從報價中扣除）</option>
                        <option value="pretax">稅前免稅（現場已免稅，不扣抵）</option>
                    </select>

                    <div class="grid2" style="margin-top:16px">
                        <div>
                            <label>政府退稅率 (%)</label>
                            <input id="taxRate" type="number" step="0.1">
                        </div>
                        <div>
                            <label>店家額外折扣 (%)</label>
                            <input id="storeDiscount" type="number" value="0" step="0.1" placeholder="例: 5">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="step">STEP 3｜商品資訊與費用</div>
                    <div class="grid2">
                        <div><label>購買人（客戶名稱）</label><input id="buyer" placeholder="例: 林小姐"></div>
                        <div><label>商品名稱</label><input id="item" placeholder="例: Dior 短夾"></div>
                    </div>
                    <div class="grid2" style="margin-top:16px">
                        <div><label>商品單價（外幣）</label><input id="price" type="number" placeholder="例: 85000"></div>
                        <div><label>數量</label><input id="qty" type="number" value="1" min="1"></div>
                    </div>
                    <div class="grid2" style="margin-top:16px; border-top: 1px solid var(--border); padding-top: 16px;">
                        <div><label>代購服務費 (台幣)</label><input id="serviceFee" type="number" value="0"></div>
                        <div><label>運費 (台幣)</label><input id="shippingFee" type="number" value="0"></div>
                    </div>
                </div>

                <button onclick="calculateSingle()" style="padding: 16px; font-size: 1.2rem;">預覽此商品報價</button>
            </div>

            <!-- 右側：單一商品預覽與加入 -->
            <div>
                <div class="card" style="position: sticky; top: 20px;">
                    <div class="step">單一商品預覽</div>
                    
                    <div id="previewCard" class="invoice" style="min-height: 200px;">
                        <div class="empty-state">請填寫左側資料並點擊「預覽此商品報價」</div>
                    </div>

                    <div id="actionButtons" style="display: none; margin-top: 20px;">
                        <button onclick="addToOrder()" style="width: 100%; padding: 16px; font-size: 1.1rem;">
                            ➕ 將此商品加入【<span id="btnBuyerName"></span>】的訂單
                        </button>
                        <p style="text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 10px;">
                            加入後，可前往「客戶對帳單」合併結算
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab 2: 訂單管理與對帳單 -->
    <div id="tab-orders" class="tab-content">
        <div class="grid-main">
            <!-- 左側：客戶列表 -->
            <div>
                <div class="card">
                    <div class="step">選擇客戶</div>
                    <div id="customerList" class="customer-list">
                        <!-- 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 右側：合併對帳單 -->
            <div>
                <div class="card" style="position: sticky; top: 20px;">
                    <div class="step">
                        <span>專屬對帳單</span>
                        <button onclick="clearCurrentCustomer()" class="btn-sm btn-danger" id="btnClear" style="display: none;">清除此客訂單</button>
                    </div>

                    <div id="orderCard" class="invoice">
                        <div class="empty-state">請先從左側選擇一位客戶</div>
                    </div>

                    <div id="orderActionButtons" class="grid2" style="display:none; margin-top: 20px;">
                        <button class="btn-outline" onclick="copyTextOrder()">📋 複製文字明細</button>
                        <button onclick="copyImageOrder()">📸 產生對帳圖片</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
// --- 資料庫模擬 (使用 localStorage) ---
// 結構: { "林小姐": [ {商品1資料}, {商品2資料} ], "王先生": [...] }
let orders = JSON.parse(localStorage.getItem('agent_orders')) || {};
let currentPreviewItem = null;
let currentSelectedCustomer = null;

function saveOrders() {
    localStorage.setItem('agent_orders', JSON.stringify(orders));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// --- Tab 切換邏輯 ---
function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    event.currentTarget.classList.add('active');

    if (tabId === 'orders') {
        renderCustomerList();
    }
}

// --- DOM 元素綁定與事件監聽 ---
const payMode = document.getElementById('payMode');
const foreignAmount = document.getElementById('foreignAmount');
const twdAmount = document.getElementById('twdAmount');
const cashForeign = document.getElementById('cashForeign');
const cashTwd = document.getElementById('cashTwd');
const rateText = document.getElementById('rateText');
const country = document.getElementById('country');
const taxRate = document.getElementById('taxRate');

function updateRateUI(){
    const r = getRate();
    rateText.innerText = r ? `1 外幣 = ${r.toFixed(5)} TWD` : '等待輸入...';
}

payMode.onchange = () => {
    document.getElementById('cardBox').style.display = payMode.value === 'card' ? 'grid' : 'none';
    document.getElementById('cashBox').style.display = payMode.value === 'cash' ? 'grid' : 'none';
    updateRateUI();
};

country.onchange = () => {
    taxRate.value = country.value.split('|')[2];
};
country.onchange();

// 監聽所有輸入框變動來更新匯率顯示
[foreignAmount, twdAmount, cashForeign, cashTwd].forEach(el => {
    el.addEventListener('input', updateRateUI);
});

// --- 核心計算邏輯 ---
function getRate(){
    if(payMode.value === 'card'){
        if(+foreignAmount.value && +twdAmount.value) return +twdAmount.value / +foreignAmount.value;
    } else {
        if(+cashForeign.value && +cashTwd.value) return +cashTwd.value / +cashForeign.value;
    }
    return 0;
}

// 單一商品計算與預覽
function calculateSingle(){
    const rate = getRate();
    if(!rate){ alert('請先填寫匯率成本資料'); return; }
    
    const buyerName = document.getElementById('buyer').value.trim();
    const itemName = document.getElementById('item').value.trim();
    if(!buyerName || !itemName) { alert('請填寫購買人與商品名稱'); return; }
    if(!document.getElementById('price').value) { alert('請填寫商品外幣單價'); return; }

    const price = +document.getElementById('price').value || 0;
    const qty = +document.getElementById('qty').value || 1;
    const base = price * qty * rate;
    
    const taxType = document.getElementById('taxType').value;
    const taxValue = parseFloat(taxRate.value || 0);
    
    let gov = 0;
    // 只有稅後退稅(posttax)才需要在報價中扣除
    if(taxType === 'posttax'){
        // 使用含稅價反推稅金 (假設收據是含稅的)
        gov = Math.round(base * (taxValue / (100 + taxValue)));
    }

    const store = Math.round(base * ((+document.getElementById('storeDiscount').value || 0) / 100));
    const cc = payMode.value === 'card' ? Math.round(base * 0.015) : 0;
    
    const svc = +document.getElementById('serviceFee').value || 0;
    const ship = +document.getElementById('shippingFee').value || 0;

    const total = Math.round(base - gov - store + cc + svc + ship);

    // 儲存當前預覽的物件
    currentPreviewItem = {
        id: Date.now().toString(),
        itemName, price, qty, rate, base, gov, store, cc, svc, ship, total,
        currency: country.value.split('|')[0]
    };

    // 渲染預覽畫面
    document.getElementById('previewCard').innerHTML = `
        <div class="invoice-header">
            <h3 class="invoice-title">單筆商品試算</h3>
            <div class="invoice-date">購買人：${buyerName}</div>
        </div>
        <div class="invoice-item" style="border:none; padding:0; background:transparent;">
            <div class="invoice-item-name">${itemName} (x${qty})</div>
            <div class="invoice-row"><span>台幣換算基準</span><span>NT$ ${Math.round(base).toLocaleString()}</span></div>
            ${cc > 0 ? `<div class="invoice-row plus"><span>刷卡手續費 (1.5%)</span><span>+ NT$ ${cc.toLocaleString()}</span></div>` : ''}
            ${gov > 0 ? `<div class="invoice-row minus"><span>政府退稅折抵</span><span>- NT$ ${gov.toLocaleString()}</span></div>` : ''}
            ${store > 0 ? `<div class="invoice-row minus"><span>店家折扣折抵</span><span>- NT$ ${store.toLocaleString()}</span></div>` : ''}
            ${svc > 0 ? `<div class="invoice-row plus"><span>代購服務費</span><span>+ NT$ ${svc.toLocaleString()}</span></div>` : ''}
            ${ship > 0 ? `<div class="invoice-row plus"><span>運費</span><span>+ NT$ ${ship.toLocaleString()}</span></div>` : ''}
        </div>
        <div class="invoice-total-section">
            <div class="total-row">
                <span class="total-label">此品項小計</span>
                <span class="total-amount">NT$ ${total.toLocaleString()}</span>
            </div>
        </div>
    `;

    document.getElementById('btnBuyerName').innerText = buyerName;
    document.getElementById('actionButtons').style.display = 'block';
}

// 加入訂單 (購物車概念)
function addToOrder() {
    if(!currentPreviewItem) return;
    const buyerName = document.getElementById('buyer').value.trim();
    
    if(!orders[buyerName]) {
        orders[buyerName] = [];
    }
    
    orders[buyerName].push(currentPreviewItem);
    saveOrders();
    
    showToast(`✅ 已加入 ${buyerName} 的訂單`);
    
    // 清空部分欄位方便連續輸入
    document.getElementById('item').value = '';
    document.getElementById('price').value = '';
    document.getElementById('previewCard').innerHTML = '<div class="empty-state">商品已加入，請繼續輸入下一筆，或切換至對帳單查看</div>';
    document.getElementById('actionButtons').style.display = 'none';
    currentPreviewItem = null;
}

// --- 客戶與對帳單邏輯 ---

function renderCustomerList() {
    const listHtml = Object.keys(orders).map(name => {
        const items = orders[name];
        const totalAmount = items.reduce((sum, item) => sum + item.total, 0);
        const isActive = currentSelectedCustomer === name ? 'active' : '';
        return `
            <div class="customer-item ${isActive}" onclick="selectCustomer('${name}')">
                <div>
                    <div class="customer-name">${name}</div>
                    <div class="customer-summary">${items.length} 件商品</div>
                </div>
                <div style="font-weight: 700; color: var(--gold);">
                    NT$ ${totalAmount.toLocaleString()}
                </div>
            </div>
        `;
    }).join('');

    document.getElementById('customerList').innerHTML = listHtml || '<div class="empty-state">目前沒有任何客戶訂單</div>';
}

function selectCustomer(name) {
    currentSelectedCustomer = name;
    renderCustomerList(); // 更新 active 狀態
    renderOrderInvoice(name);
}

function renderOrderInvoice(name) {
    const items = orders[name];
    if(!items || items.length === 0) return;

    const today = new Date().toLocaleDateString('zh-TW');
    const grandTotal = items.reduce((sum, item) => sum + item.total, 0);

    let itemsHtml = items.map(item => `
        <div class="invoice-item">
            <div class="invoice-item-name">${item.itemName} (x${item.qty})</div>
            <div class="invoice-row"><span>台幣換算基準 (${item.price} ${item.currency})</span><span>NT$ ${Math.round(item.base).toLocaleString()}</span></div>
            ${item.cc > 0 ? `<div class="invoice-row plus"><span>刷卡手續費</span><span>+ NT$ ${item.cc.toLocaleString()}</span></div>` : ''}
            ${item.gov > 0 ? `<div class="invoice-row minus"><span>退稅折抵</span><span>- NT$ ${item.gov.toLocaleString()}</span></div>` : ''}
            ${item.store > 0 ? `<div class="invoice-row minus"><span>店家折扣</span><span>- NT$ ${item.store.toLocaleString()}</span></div>` : ''}
            ${item.svc > 0 ? `<div class="invoice-row plus"><span>代購服務費</span><span>+ NT$ ${item.svc.toLocaleString()}</span></div>` : ''}
            ${item.ship > 0 ? `<div class="invoice-row plus"><span>運費</span><span>+ NT$ ${item.ship.toLocaleString()}</span></div>` : ''}
            <div class="invoice-row" style="margin-top: 8px; font-weight: 700; color: #111;">
                <span>品項小計</span><span>NT$ ${item.total.toLocaleString()}</span>
            </div>
        </div>
    `).join('');

    document.getElementById('orderCard').innerHTML = `
        <div class="invoice-header">
            <h2 class="invoice-title">代購專屬對帳單</h2>
            <div class="invoice-date">建立日期：${today}</div>
        </div>
        <div class="invoice-customer">致：${name}</div>
        
        <div style="margin-bottom: 20px;">
            ${itemsHtml}
        </div>
        
        <div class="invoice-total-section">
            <div class="total-row">
                <span class="total-label">應付總額</span>
                <span class="total-amount">NT$ ${grandTotal.toLocaleString()}</span>
            </div>
            <p style="text-align: center; color: #9ca3af; font-size: 0.8rem; margin-top: 10px;">感謝您的委託，請確認以上明細</p>
        </div>
    `;

    document.getElementById('orderActionButtons').style.display = 'grid';
    document.getElementById('btnClear').style.display = 'inline-block';
}

function clearCurrentCustomer() {
    if(confirm(`確定要清除 ${currentSelectedCustomer} 的所有訂單紀錄嗎？`)) {
        delete orders[currentSelectedCustomer];
        saveOrders();
        currentSelectedCustomer = null;
        renderCustomerList();
        document.getElementById('orderCard').innerHTML = '<div class="empty-state">請先從左側選擇一位客戶</div>';
        document.getElementById('orderActionButtons').style.display = 'none';
        document.getElementById('btnClear').style.display = 'none';
    }
}

// --- 匯出功能 ---

async function copyTextOrder(){
    if(!currentSelectedCustomer || !orders[currentSelectedCustomer]) return;
    
    const items = orders[currentSelectedCustomer];
    const grandTotal = items.reduce((sum, item) => sum + item.total, 0);
    
    let text = `【代購專屬對帳單】\n購買人：${currentSelectedCustomer}\n================\n`;
    
    items.forEach(item => {
        text += `▪ ${item.itemName} (x${item.qty})\n`;
        text += `  小計：NT$ ${item.total.toLocaleString()}\n`;
    });
    
    text += `================\n應付總計：NT$ ${grandTotal.toLocaleString()}\n`;
    text += `(點擊圖片查看詳細各項費用扣抵明細)`;
    
    await navigator.clipboard.writeText(text);
    showToast('📋 文字明細已複製，可直接貼上');
}

async function copyImageOrder(){
    if(!currentSelectedCustomer) return;
    
    const target = document.getElementById('orderCard');
    const btn = event.currentTarget;
    const originalText = btn.innerText;
    
    btn.innerText = '圖片產生中...';
    btn.disabled = true;

    try {
        const canvas = await html2canvas(target, { scale: 2 });
        canvas.toBlob(async(blob) => {
            if(!blob) throw new Error('Blob 生成失敗');
            await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
            showToast('📸 對帳圖片已複製！請至聊天室貼上');
        });
    } catch(e) {
        alert('複製圖片失敗，您的瀏覽器可能不支援此功能，請嘗試截圖。');
        console.error(e);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
</script>
