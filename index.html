<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgentPro</title>

<style>

body{
    font-family: "Microsoft JhengHei", sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:8px;
}

.btn-primary{
    background:#000;
    color:#fff;
}

.btn-danger{
    background:#d32f2f;
    color:white;
}

.result{
    background:#000;
    color:#fff;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
}

.history-item{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
}

.price{
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>AgentPro</h1>

<div class="card">

<label>商品名稱</label>
<input id="itemName" type="text">

<label>商品價格</label>
<input id="itemPrice" type="number">

<label>數量</label>
<input id="itemQty" type="number" value="1">

<button class="btn-primary" onclick="calculate()">
計算
</button>

<div id="resultArea"></div>

</div>

<div class="card">

<h2>計算歷史</h2>

<button class="btn-danger" onclick="clearHistory()">
清空全部
</button>

<div id="historyList"></div>

</div>

</div>

<script>

let historyData =
JSON.parse(
localStorage.getItem("agentpro_history")
) || [];

function saveHistory() {

localStorage.setItem(
"agentpro_history",
JSON.stringify(historyData)
);

}

function calculate(){

const itemName =
document.getElementById("itemName").value;

const itemPrice =
parseFloat(
document.getElementById("itemPrice").value
) || 0;

const qty =
parseInt(
document.getElementById("itemQty").value
) || 1;

const total =
itemPrice * qty;

const record = {

id: Date.now(),

item: itemName,

price: itemPrice,

qty: qty,

total: total,

date: new Date().toLocaleString()

};

historyData.unshift(record);

saveHistory();

document.getElementById("resultArea").innerHTML =

`
<div class="result">

<h3>${itemName}</h3>

<p>單價：${itemPrice.toLocaleString()}</p>

<p>數量：${qty}</p>

<p class="price">
總價 NT$ ${total.toLocaleString()}
</p>

</div>
`;

renderHistory();

}

function renderHistory(){

const list =
document.getElementById("historyList");

if(historyData.length===0){

list.innerHTML="<p>尚無資料</p>";

return;
}

list.innerHTML =
historyData.map(item =>

`
<div class="history-item">

<div>
<strong>${item.item}</strong>
</div>

<div>
單價：${item.price.toLocaleString()}
</div>

<div>
數量：${item.qty}
</div>

<div class="price">
NT$ ${item.total.toLocaleString()}
</div>

<div>
${item.date}
</div>

<br>

<button
class="btn-danger"
onclick="deleteRecord(${item.id})"
>
刪除
</button>

</div>
`
).join("");

}

function deleteRecord(id){

historyData =
historyData.filter(
item => item.id !== id
);

saveHistory();

renderHistory();

}

function clearHistory(){

if(confirm("確定清空所有紀錄？")){

historyData = [];

saveHistory();

renderHistory();

}

}

renderHistory();

</script>

</body>
</html>
